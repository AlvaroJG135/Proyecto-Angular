<ng-container *ngIf="esAdmin; else usuarioBlock">
<div class="dashboard-container">

  <h1>FIT-KMKZ</h1>

  <div class="graficos-container">
    <!-- GRÁFICO SALARIOS -->
    <div class="grafico-card">
      <h2>Salarios de Monitores</h2>
      <ngx-charts-bar-vertical
        [results]="salarioData"
        [xAxis]="showXAxis"
        [yAxis]="showYAxis"
        [legend]="showLegend"
        [showXAxisLabel]="showXAxisLabel"
        [showYAxisLabel]="showYAxisLabel"
        [xAxisLabel]="xAxisLabel"
        [yAxisLabel]="yAxisLabel"
        [gradient]="gradient"
        [scheme]="colorScheme"
        [view]="[650, 300]">
      </ngx-charts-bar-vertical>
    </div>

    <!-- GRÁFICO MARCAS -->
    <div class="grafico-card">
      <h2>Marcas de Máquinas</h2>
      <ngx-charts-pie-chart
        [results]="marcasData"
        [legend]="showLegend"
        [scheme]="colorScheme"
        [view]="[650, 300]">
      </ngx-charts-pie-chart>
    </div>
  </div>

</div>
</ng-container>
<ng-template #usuarioBlock>
  <section class="usuario-welcome">
    <h2>Hola, {{ gestionarUsuarios.usuarioActual() || 'invitado' }}</h2>
  </section>

  <section class="horario-semanal">
    <h3>Horario semanal de clases</h3>
    <div class="calendar-grid">
      <div class="day-column" *ngFor="let dia of diasSemana">
        <h4>{{dia}}</h4>
        <div class="day-clase" *ngFor="let clase of clasesDisponibles">
          <ng-container *ngIf="clase.dia === dia">
            <div class="clase-card">
              <p class="clase-nombre">{{clase.nombre}}</p>
              <p>{{clase.hora}}</p>
              <p>{{clase.monitor}}</p>
              <button class="btn-small" (click)="toggleClaseEnCarrito(clase)" [disabled]="enReservada(clase)">
                {{ enReservada(clase) ? 'Reservada' : (enCarrito(clase) ? 'Quitar' : 'Añadir') }}
              </button>
            </div>
          </ng-container>
        </div>
      </div>
    </div>
  </section>
</ng-template>
